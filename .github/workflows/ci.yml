name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_KEY }}
          source: ".next,app,public,package.json,next.config.js,tsconfig.json,postcss.config.mjs,bun.lock"
          target: /var/www/dad-jack-learns-math
          strip_components: 0
          overwrite: true

      - name: Install and start on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_KEY }}
          script: |
            cd /var/www/dad-jack-learns-math
            pkill -f "next start" || true
            bun install
            nohup bun run start > /tmp/nextjs.log 2>&1 &
            sleep 3
            curl -s http://localhost:3000 | head -c 500
